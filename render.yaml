services:
  - type: web
    name: svp-live-app
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: FRONTEND_DIR
        value: ./web
      - key: DATA_FILE
        value: ./data/db.sqlite
    disk:
      name: app-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
